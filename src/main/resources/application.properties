# ─── Aplicacion ───────────────────────────────────────────────────────────────
spring.application.name=sabores-del-mundo-backend
server.port=8081

# ─── MySQL ────────────────────────────────────────────────────────────────────
# Ajusta usuario, contraseña y nombre de BD según tu entorno local
spring.datasource.url=jdbc:mysql://localhost:3306/sabores_del_mundo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# "update" crea/actualiza tablas sin borrar datos existentes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
# El secreto debe tener al menos 256 bits (32 caracteres) para HS256
app.jwt.secret=SaboresDelMundoSecretKeyParaJWT2024SuperSegura!!DUOC_UC
# Expiración en milisegundos: 86400000 = 24 horas
app.jwt.expiration=86400000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.com.duoc.backend=DEBUG
